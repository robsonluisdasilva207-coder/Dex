<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEX IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#ff2222',
                        escuro: '#0a0a0f',
                        medio: '#15151e',
                        cinza: '#22222e',
                        cinzaClaro: '#858596',
                        texto: '#f0f0f8'
                    },
                    fontFamily: { sans: ['Inter', 'Segoe UI', 'Roboto', 'sans-serif'] }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .transicao { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
            .mensagem-ia { border-left: 3px solid #ff2222; }
            .menu-jogos { max-height: 0; opacity: 0; overflow: hidden; }
            .menu-jogos.aberto { max-height: 220px; opacity: 1; }
            .ponto-logo { @apply w-2 h-2 rounded-full bg-principal; }
            .rolagem-suave { scroll-behavior: smooth; }
            .gravando { animation: pulso 1.5s infinite; }
            .ligacao-ativa { animation: piscar 2s infinite; }
            .aba-historico { transform: translateX(100%); opacity: 0; }
            .aba-historico.aberto { transform: translateX(0); opacity: 1; }

            @keyframes pulso {
                0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 34, 34, 0.4); }
                70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 34, 34, 0); }
                100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 34, 34, 0); }
            }
            @keyframes piscar {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.6; }
            }
        }
    </style>
</head>
<body class="bg-escuro text-texto font-sans overflow-x-hidden rolagem-suave">

<!-- MENU LATERAL -->
<div class="fixed top-0 left-0 h-full w-20 bg-medio shadow-lg z-50 flex flex-col items-center py-6 justify-between border-r border-cinza/40">
    <div class="flex flex-col gap-10 items-center">
        <div class="flex flex-col items-center gap-2">
            <div class="grid grid-cols-2 gap-1">
                <div class="ponto-logo"></div><div class="ponto-logo"></div>
                <div class="ponto-logo"></div><div class="ponto-logo"></div>
            </div>
            <span class="text-xl font-bold text-principal tracking-wider">DEX</span>
        </div>

        <div class="flex flex-col gap-8 items-center">
            <button id="botaoHistorico" class="text-2xl hover:scale-110 hover:text-principal transicao" title="Histórico de conversas">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>
            <button class="text-xl text-principal hover:scale-110 transicao" title="Nova conversa">
                <i class="fa-solid fa-comments"></i>
            </button>
            <button id="botaoLigacao" class="text-xl hover:scale-110 transicao" title="Ligação permanente">
                <i class="fa-solid fa-phone"></i>
            </button>
            <button id="botaoMais" class="w-11 h-11 rounded-full bg-cinza flex items-center justify-center text-xl transicao hover:bg-principal hover:text-white shadow-sm">
                +
            </button>
        </div>
    </div>
    <div class="text-xs text-cinzaClaro">v1.3</div>
</div>

<!-- ABA DE HISTÓRICO -->
<div id="abaHistorico" class="fixed top-0 right-0 h-full w-72 bg-medio shadow-2xl z-50 transicao aba-historico border-l border-cinza/60">
    <div class="p-4 border-b border-cinza/50 flex items-center justify-between">
        <h3 class="text-lg font-semibold">📜 Histórico</h3>
        <button id="fecharHistorico" class="text-xl hover:text-principal transicao">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
    <div id="listaHistorico" class="p-3 space-y-2 overflow-y-auto h-[calc(100vh-64px)]">
        <p class="text-cinzaClaro text-center mt-4">Suas conversas aparecerão aqui</p>
    </div>
</div>

<!-- MENU DE JOGOS -->
<div id="menuJogos" class="fixed left-24 top-28 w-48 bg-medio rounded-xl shadow-xl z-40 menu-jogos transicao p-2 border border-cinza/60">
    <button onclick="mudarJogo('minecraft')" class="w-full text-left p-3 rounded-lg hover:bg-cinza flex items-center gap-3 transicao">
        <span class="text-green-500 text-lg">🟩</span>
        <span>Minecraft Bedrock</span>
    </button>
    <button onclick="mudarJogo('roblox')" class="w-full text-left p-3 rounded-lg hover:bg-cinza flex items-center gap-3 transicao">
        <span class="text-red-500 font-bold">R</span>
        <span>Roblox / Delta</span>
    </button>
    <button onclick="mudarJogo('ff')" class="w-full text-left p-3 rounded-lg hover:bg-cinza flex items-center gap-3 transicao">
        <span class="text-white font-bold">FF</span>
        <span>Free Fire</span>
    </button>
</div>

<!-- ÁREA PRINCIPAL -->
<main class="ml-20 h-screen flex flex-col">
    <header class="h-16 bg-medio flex items-center justify-between px-6 border-b border-cinza/50 shadow-sm">
        <h2 class="text-lg font-semibold tracking-wide">DEX IA <span id="jogoAtual" class="text-sm text-cinzaClaro ml-2 font-normal">| Nenhum jogo selecionado</span></h2>
        <div class="flex gap-5 items-center">
            <span id="statusLigacao" class="hidden text-sm text-green-400 font-medium">🔊 Em ligação</span>
        </div>
    </header>

    <div id="caixaConversa" class="flex-1 p-5 overflow-y-auto space-y-5 bg-escuro/95">
        <div class="mensagem-ia bg-medio p-4 rounded-lg shadow-sm max-w-[88%]">
            <p class="text-sm leading-relaxed">👋 Olá! Selecione um jogo, envie texto, imagem ou use o microfone. A ligação continua funcionando mesmo se você minimizar ou abrir outro aplicativo!</p>
        </div>
    </div>

    <div class="h-20 bg-medio border-t border-cinza/50 px-4 flex items-center gap-3 shadow-inner">
        <input type="file" id="entradaImagem" accept="image/*" class="hidden">
        <button onclick="document.getElementById('entradaImagem').click()" class="w-10 h-10 rounded-full bg-cinza flex items-center justify-center text-lg transicao hover:bg-principal hover:text-white shadow-sm" title="Enviar imagem">
            <i class="fa-solid fa-image"></i>
        </button>

        <button id="botaoMicrofone" class="w-10 h-10 rounded-full bg-cinza flex items-center justify-center text-lg transicao hover:bg-principal hover:text-white shadow-sm" title="Usar microfone">
            <i class="fa-solid fa-microphone"></i>
        </button>

        <input type="text" id="campoMensagem" placeholder="Digite sua mensagem..." class="flex-1 bg-cinza rounded-full px-4 py-2.5 outline-none focus:ring-2 focus:ring-principal/40 transition-shadow">

        <button onclick="enviarMensagem()" class="w-10 h-10 rounded-full bg-principal flex items-center justify-center text-white text-lg transicao hover:bg-principal/90 shadow-md" title="Enviar">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</main>

<script>
// ==============================================
// CONFIGURAÇÃO COMPLETA OPENROUTER
// ==============================================
const CHAVE_IA = "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";
const URL_IA = "https://openrouter.ai/api/v1/chat/completions";
const MODELO_IA = "qwen/qwen-2-vl-72b-instruct";
const SITE_URL = "https://robsonluisasilva207-coder.github.io/Dex/";
const SITE_NOME = "DEX IA";

// ==============================================
// VARIÁVEIS GLOBAIS
// ==============================================
let jogoSelecionado = null;
let reconhecimentoVoz = null;
let gravando = false;
let ligacaoAtiva = false;
let imagemBase64 = null;
let historicoConversas = [];

// ==============================================
// SISTEMA DE HISTÓRICO
// ==============================================
const botaoHistorico = document.getElementById('botaoHistorico');
const abaHistorico = document.getElementById('abaHistorico');
const fecharHistorico = document.getElementById('fecharHistorico');

botaoHistorico.addEventListener('click', () => abaHistorico.classList.toggle('aberto'));
fecharHistorico.addEventListener('click', () => abaHistorico.classList.remove('aberto'));

document.addEventListener('click', (e) => {
    if (!abaHistorico.contains(e.target) && !botaoHistorico.contains(e.target)) {
        abaHistorico.classList.remove('aberto');
    }
});

// ==============================================
// MENU DE JOGOS
// ==============================================
const botaoMais = document.getElementById('botaoMais');
const menuJogos = document.getElementById('menuJogos');

botaoMais.addEventListener('click', () => {
    menuJogos.classList.toggle('aberto');
    botaoMais.classList.toggle('bg-principal');
    botaoMais.classList.toggle('text-white');
});

function mudarJogo(jogo) {
    jogoSelecionado = jogo;
    const nomes = {
        minecraft: "Minecraft Bedrock",
        roblox: "Roblox / Delta Mobile",
        ff: "Free Fire"
    };
    document.getElementById('jogoAtual').textContent = `| ${nomes[jogo]}`;
    menuJogos.classList.remove('aberto');
    botaoMais.classList.remove('bg-principal', 'text-white');
}

// ==============================================
// LIGAÇÃO PERMANENTE
// ==============================================
const botaoLigacao = document.getElementById('botaoLigacao');
const statusLigacao = document.getElementById('statusLigacao');

botaoLigacao.addEventListener('click', () => ligacaoAtiva ? pararLigacao() : iniciarLigacao());

function iniciarLigacao() {
    ligacaoAtiva = true;
    botaoLigacao.classList.add('text-green-400', 'ligacao-ativa');
    statusLigacao.classList.remove('hidden');
    if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
    adicionarMensagem('ia', '📞 Ligação iniciada! Continuo ouvindo mesmo se minimizar ou trocar de jogo.');
}

function pararLigacao() {
    ligacaoAtiva = false;
    botaoLigacao.classList.remove('text-green-400', 'ligacao-ativa');
    statusLigacao.classList.add('hidden');
    if (reconhecimentoVoz) reconhecimentoVoz.stop();
    adicionarMensagem('ia', '📴 Ligação encerrada.');
}

// ==============================================
// MICROFONE
// ==============================================
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    reconhecimentoVoz = new SpeechRecognitionAPI();
    reconhecimentoVoz.lang = 'pt-BR';
    reconhecimentoVoz.continuous = true;
    reconhecimentoVoz.interimResults = false;

    const botaoMic = document.getElementById('botaoMicrofone');

    botaoMic.addEventListener('click', () => {
        if (!gravando) {
            reconhecimentoVoz.start();
            botaoMic.classList.add('bg-principal', 'gravando');
            gravando = true;
        } else {
            reconhecimentoVoz.stop();
            botaoMic.classList.remove('bg-principal', 'gravando');
            gravando = false;
        }
    });

    reconhecimentoVoz.onresult = (evento) => {
        const textoFalado = evento.results[evento.results.length - 1][0].transcript.trim();
        if (textoFalado) {
            document.getElementById('campoMensagem').value = textoFalado;
            if (ligacaoAtiva) setTimeout(enviarMensagem, 600);
        }
    };

    reconhecimentoVoz.onerror = () => {
        if (!ligacaoAtiva) {
            botaoMic.classList.remove('bg-principal', 'gravando');
            gravando = false;
        }
    };

    reconhecimentoVoz.onend = () => {
        if (ligacaoAtiva) reconhecimentoVoz.start();
    };
}

// ==============================================
// ANÁLISE DE IMAGENS
// ==============================================
document.getElementById('entradaImagem').addEventListener('change', (e) => {
    const arquivo = e.target.files[0];
    if (!arquivo) return;
    const leitor = new FileReader();
    leitor.onload = (ev) => {
        imagemBase64 = ev.target.result;
        adicionarMensagem('usuario', '📸 Imagem enviada. Pergunte o que quiser sobre ela!');
    };
    leitor.readAsDataURL(arquivo);
});

// ==============================================
// ENVIO DE MENSAGENS
// ==============================================
async function enviarMensagem() {
    const campo = document.getElementById('campoMensagem');
    const texto = campo.value.trim();
    if (!texto && !imagemBase64) return;

    if (texto) adicionarMensagem('usuario', texto);
    campo.value = '';
    adicionarMensagem('ia', 'Pensando... ⏳');

    let instrucao = '';
    switch(jogoSelecionado) {
        case 'minecraft':
            instrucao = `Você é especialista em Minecraft Bedrock. Responda com comandos, addons, redstone compatíveis. Explique passo a passo. Pergunta: ${texto}`;
            break;
        case 'roblox':
            instrucao = `Você é especialista em scripts Roblox e Delta Mobile. Use código Lua funcional e explique onde usar. Pergunta: ${texto}`;
            break;
        case 'ff':
            instrucao = `Você é especialista em Free Fire. Dê DPI, sensibilidade e configurações por celular. Pergunta: ${texto}`;
            break;
        default:
            instrucao = `Responda em português do Brasil, claro e direto. Se tiver imagem, analise com detalhes: ${texto || 'Descreva o conteúdo da imagem'}`;
    }

    try {
        const mensagens = [{ role: "user", content: [] }];
        if (texto) mensagens[0].content.push({ type: "text", text: instrucao });
        if (imagemBase64) {
            mensagens[0].content.push({ type: "image_url", image_url: { url: imagemBase64 } });
            imagemBase64 = null;
        }

        const resposta = await fetch(URL_IA, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${CHAVE_IA}`,
                "HTTP-Referer": SITE_URL,
                "X-Title": SITE_NOME
            },
            body: JSON.stringify({ model: MODELO_IA, messages: mensagens })
        });

        const dados = await resposta.json();
        removerUltimaMensagem();

        if (dados.error) throw new Error(dados.error.message);
        const respostaIA = dados.choices[0].message.content;
        adicionarMensagem('ia', respostaIA);

        historicoConversas.push({ pergunta: texto, resposta: respostaIA });
        atualizarHistorico();

    } catch (erro) {
        removerUltimaMensagem();
        adicionarMensagem('ia', `❌ Erro: ${erro.message}`);
    }
}

// ==============================================
// FUNÇÕES AUXILIARES
// ==============================================
function adicionarMensagem(tipo, conteudo) {
    const caixa = document.getElementById('caixaConversa');
    const div = document.createElement('div');
    div.className = `max-w-[88%] p-4 rounded-lg shadow-sm whitespace-pre-wrap leading-relaxed transicao ${
        tipo === 'usuario' ? 'bg-principal/90 ml-auto text-white text-right' : 'bg-medio mensagem-ia mr-auto'
    }`;
    div.textContent = conteudo;
    caixa.appendChild(div);
    caixa.scrollTop = caixa.scrollHeight;
}

function removerUltimaMensagem() {
    const caixa = document.getElementById('caixaConversa');
    caixa.removeChild(caixa.lastChild);
}

function atualizarHistorico() {
    const lista = document.getElementById('listaHistorico');
    lista.innerHTML = '';
    if (historicoConversas.length === 0) {
        lista.innerHTML = '<p class="text-cinzaClaro text-center mt-4">Suas conversas aparecerão aqui</p>';
        return;
    }
    historicoConversas.slice().reverse().forEach((item) => {
        const div = document.createElement('div');
        div.className = 'p-3 rounded-lg bg-cinza hover:bg-cinza/70 cursor-pointer transicao';
        div.innerHTML = `<p class="text-sm font-medium truncate">${item.pergunta || 'Imagem enviada'}</p>`;
        div.onclick = () => {
            document.getElementById('caixaConversa').innerHTML = '';
            adicionarMensagem('usuario', item.pergunta);
            adicionarMensagem('ia', item.resposta);
            abaHistorico.classList.remove('aberto');
        };
        lista.appendChild(div);
    });
}

document.getElementById('campoMensagem').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') enviarMensagem();
});

document.addEventListener('visibilitychange', () => {
    if (ligacaoAtiva && document.hidden && reconhecimentoVoz?.state === 'inactive') {
        reconhecimentoVoz.start();
    }
});
</script>

</body>
</html>
