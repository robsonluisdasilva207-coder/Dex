<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>DEXas - Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#0A0A0F',
                        fundoCard: '#12121A',
                        menuFundo: '#0E0E16',
                        destaque: '#FF2233',
                        destaqueClaro: '#FF4455',
                        texto: '#F8F8FC',
                        textoSuave: '#B0B0C0',
                        borda: '#222230'
                    }
                }
            }
        }
    </script>
    <style>
        .transicao { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .transicao-rapida { transition: all 0.2s ease; }
        .menu-lateral { width:280px; transform:translateX(-100%); background:linear-gradient(180deg,#0E0E16,#0A0A0F); }
        .menu-lateral.aberto { transform:translateX(0); }
        .item-menu { @apply flex items-center gap-4 p-3 rounded-xl transicao; }
        .item-menu:hover { @apply bg-fundoCard translate-x-1; }
        .item-menu.ativo { @apply bg-destaque/10 border-l-4 border-destaque text-destaque; }
        .submenu { max-height:0; opacity:0; overflow:hidden; transform:translateY(-8px); }
        .submenu.aberto { max-height:240px; opacity:1; transform:translateY(0); }
        .bolha-ia { @apply bg-fundoCard rounded-2xl p-4 max-w-[88%] rounded-tl-sm; border-left:3px solid #222230; }
        .bolha-usuario { @apply bg-gradient-to-br from-destaque to-destaqueClaro rounded-2xl p-4 max-w-[88%] rounded-tr-sm ml-auto text-white; }
        .animate-fade { animation:fadeIn 0.3s forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .rotate-180 { transform: rotate(180deg); }
        pre { white-space: pre-wrap; font-family: monospace; background: #1a1a25; padding: 8px; border-radius: 6px; margin: 6px 0; }
    </style>
</head>
<body class="bg-fundo text-texto h-screen flex overflow-hidden">

<!-- MENU LATERAL -->
<div id="menuLateral" class="menu-lateral fixed top-0 left-0 h-full z-50 border-r border-borda transicao">
    <div class="p-5 border-b border-borda/50">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-destaque to-destaqueClaro flex items-center justify-center text-white">
                    <i class="fa-solid fa-brain"></i>
                </div>
                <h2 class="text-xl font-bold">DEXas</h2>
            </div>
            <button id="fecharMenu" class="text-xl text-textoSuave hover:text-destaque transicao">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <p class="text-xs text-textoSuave mt-2">Com Gemini • Cria do Zero</p>
    </div>

    <div class="p-4 space-y-2 mt-2">
        <div class="item-menu ativo">
            <div class="w-9 h-9 rounded-lg bg-fundo flex items-center justify-center text-destaque">
                <i class="fa-solid fa-comments"></i>
            </div>
            <span>Nova Conversa</span>
        </div>

        <div class="item-menu" onclick="toggleSubmenu()">
            <div class="w-9 h-9 rounded-lg bg-fundo flex items-center justify-center text-blue-400">
                <i class="fa-solid fa-gamepad"></i>
            </div>
            <div class="flex justify-between items-center w-full">
                <span>Modos de Jogo</span>
                <i id="setaSubmenu" class="fa-solid fa-chevron-down text-xs text-textoSuave transicao-rapida"></i>
            </div>
        </div>

        <div id="submenuJogos" class="submenu transicao-rapida ml-12 space-y-1 pr-2">
            <button onclick="mudarModo('minecraft')" class="w-full text-left p-2 rounded-lg hover:bg-fundo transicao flex items-center gap-2">🟩 Minecraft Bedrock</button>
            <button onclick="mudarModo('roblox')" class="w-full text-left p-2 rounded-lg hover:bg-fundo transicao flex items-center gap-2">🟥 Roblox / Delta</button>
            <button onclick="mudarModo('ff')" class="w-full text-left p-2 rounded-lg hover:bg-fundo transicao flex items-center gap-2">⚔️ Free Fire</button>
            <button onclick="mudarModo('geral')" class="w-full text-left p-2 rounded-lg hover:bg-fundo transicao flex items-center gap-2">💬 Modo Geral</button>
        </div>

        <div class="item-menu">
            <div class="w-9 h-9 rounded-lg bg-fundo flex items-center justify-center text-purple-400">
                <i class="fa-solid fa-history"></i>
            </div>
            <span>Histórico</span>
        </div>
    </div>

    <div class="absolute bottom-5 left-0 right-0 text-center text-xs text-textoSuave">
        DEXas • Gemini
    </div>
</div>

<!-- ÁREA PRINCIPAL -->
<div class="flex-1 flex flex-col h-full">
    <header class="bg-menuFundo border-b border-borda/50 px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="abrirMenu" class="w-10 h-10 rounded-xl bg-fundo flex items-center justify-center text-lg transicao hover:bg-fundoCard">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div>
                <h1 class="text-lg font-bold">DEXas</h1>
                <p id="statusModo" class="text-xs text-textoSuave">Pronto para usar ✅</p>
            </div>
        </div>
    </header>

    <div id="caixaConversa" class="flex-1 overflow-y-auto p-5 space-y-5 bg-gradient-to-b from-fundo to-fundo/95">
        <div class="flex gap-3 animate-fade">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-destaque to-destaqueClaro flex items-center justify-center text-white shrink-0">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div class="bolha-ia">
                <p>👋 Tudo certo! Agora uso o Gemini para criar respostas, scripts e comandos do zero. Funciona em qualquer navegador.</p>
            </div>
        </div>
    </div>

    <div class="bg-menuFundo border-t border-borda/50 p-4 flex gap-3">
        <input id="campoMensagem" type="text" placeholder="Digite sua mensagem..." class="flex-1 bg-fundo rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-destaque/40 transicao">
        <button onclick="enviarMensagem()" class="w-10 h-10 rounded-xl bg-gradient-to-br from-destaque to-destaqueClaro flex items-center justify-center text-white transicao hover:brightness-110">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
// 🗝️ CHAVE JÁ COLOCADA
const GEMINI_CHAVE = "AQ.AB8RN6LLGJVM01BgVEA1f-y1czr0We5QthVdvCM4TQuUxAHzcg";
const GEMINI_MODELO = "gemini-1.5-flash";
let modoAtual = "geral";

// 📤 Função de envio e resposta
async function enviarMensagem() {
    const campo = document.getElementById("campoMensagem");
    const texto = campo.value.trim();
    if (!texto) return;

    adicionarMensagem("usuario", texto);
    campo.value = "";
    adicionarMensagem("ia", "Pensando... 🤔");

    let sistema = `Você é o DEXas, assistente especializado em jogos e programação. Responda SEMPRE em português do Brasil, de forma clara e direta. Se pedirem código, comando ou script, escreva ele completo e funcional. Não use mensagens genéricas — crie a resposta específica para o que foi perguntado.`;

    if (modoAtual === "minecraft") sistema += " Crie comandos válidos para Minecraft Bedrock Edition.";
    if (modoAtual === "roblox") sistema += " Crie scripts Lua funcionais para Roblox e Delta Executor.";
    if (modoAtual === "ff") sistema += " Dê dicas de configuração, DPI e sensibilidade para Free Fire.";

    try {
        const resposta = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODELO}:generateContent?key=${GEMINI_CHAVE}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{
                    parts: [{ text: sistema + "\n\nPergunta: " + texto }]
                }]
            })
        });

        const dados = await resposta.json();
        removerUltimaMensagem();

        if (dados.candidates && dados.candidates[0].content) {
            const textoResposta = dados.candidates[0].content.parts[0].text;
            adicionarMensagem("ia", textoResposta);
        } else {
            adicionarMensagem("ia", "❌ Não funcionou a instalação/resposta.");
        }

    } catch (erro) {
        console.error("Erro:", erro);
        removerUltimaMensagem();
        adicionarMensagem("ia", "❌ Não funcionou a instalação");
    }
}

// 🎛️ Controles
function toggleSubmenu() {
    const sub = document.getElementById('submenuJogos');
    const seta = document.getElementById('setaSubmenu');
    sub.classList.toggle('aberto');
    seta.classList.toggle('rotate-180');
}

function mudarModo(modo) {
    modoAtual = modo;
    const nomes = { geral: "Geral 💬", minecraft: "Minecraft 🟩", roblox: "Roblox 🟥", ff: "Free Fire ⚔️" };
    document.getElementById('statusModo').textContent = `Modo: ${nomes[modo]}`;
    adicionarMensagem("ia", `✅ Modo alterado para ${nomes[modo]}`);
    toggleSubmenu();
}

// 🛠️ Funções auxiliares
function adicionarMensagem(tipo, conteudo) {
    const caixa = document.getElementById('caixaConversa');
    const div = document.createElement('div');
    div.className = "flex gap-3 animate-fade";
    div.innerHTML = `
        <div class="w-10 h-10 rounded-xl shrink-0 flex items-center justify-center ${tipo==='usuario'?'bg-gradient-to-br from-destaque to-destaqueClaro':'bg-fundoCard text-destaque'}">
            <i class="fa-solid ${tipo==='usuario'?'fa-user':'fa-robot'}"></i>
        </div>
        <div class="${tipo==='usuario'?'bolha-usuario':'bolha-ia'}"><p class="whitespace-pre-wrap">${conteudo}</p></div>
    `;
    caixa.appendChild(div);
    caixa.scrollTop = caixa.scrollHeight;
}

function removerUltimaMensagem() {
    const caixa = document.getElementById('caixaConversa');
    caixa.removeChild(caixa.lastChild);
}

// Controles de menu
document.getElementById('abrirMenu').onclick = () => document.getElementById('menuLateral').classList.add('aberto');
document.getElementById('fecharMenu').onclick = () => document.getElementById('menuLateral').classList.remove('aberto');
document.addEventListener('click', e => {
    if (!document.getElementById('menuLateral').contains(e.target) && !document.getElementById('abrirMenu').contains(e.target))
        document.getElementById('menuLateral').classList.remove('aberto');
});
document.getElementById('campoMensagem').addEventListener('keydown', e => e.key==='Enter' && enviarMensagem());

</script>

</body>
    </html>
