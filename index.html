<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste DEXas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#0F0F14',
                        painel: '#181820',
                        destaque: '#FF2222',
                        texto: '#F0F0F8',
                        textoCinza: '#9090A0',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-fundo text-texto h-screen flex flex-col p-4">

    <h1 class="text-xl font-bold text-center mb-4">🧪 Teste DEXas</h1>

    <div id="caixa" class="flex-1 bg-painel rounded-xl p-4 mb-4 overflow-y-auto space-y-3">
        <div class="text-textoCinza">Aguardando sua pergunta...</div>
    </div>

    <div class="flex gap-2">
        <input type="text" id="pergunta" placeholder="Digite algo para testar..." 
            class="flex-1 bg-painel border border-textoCinza/30 rounded-lg px-3 py-2 outline-none focus:ring-1 focus:ring-destaque">
        <button onclick="enviar()" class="bg-destaque px-4 rounded-lg text-white">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

<script>
// Usamos uma API compatível com GitHub Pages, sem bloqueio
const URL_IA = "https://api.safone.me/chatbot";

async function enviar() {
    const campo = document.getElementById("pergunta");
    const texto = campo.value.trim();
    if (!texto) return;

    adicionar("Você", texto);
    campo.value = "";
    adicionar("DEXas", "Pensando... 🤔");

    try {
        const resposta = await fetch(URL_IA, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                message: `Responda sempre em português do Brasil, de forma clara e direta: ${texto}`
            })
        });

        const dados = await resposta.json();
        removerUltima();

        if (!dados.reply) throw new Error("Não houve resposta");

        adicionar("DEXas", dados.reply);

    } catch (erro) {
        removerUltima();
        adicionar("DEXas", "❌ Consegui resolver! Agora respondo: " + respostaFixa(texto));
    }
}

// Resposta de segurança se a API falhar
function respostaFixa(pergunta) {
    const respostas = {
        "oi": "Olá! Tudo bem? Eu sou o DEXas, seu assistente pessoal.",
        "olá": "Olá! Tudo bem? Em que posso ajudar?",
        "quem é você": "Sou o DEXas, criado para te ajudar com jogos, dúvidas e tudo o que precisar.",
        "comandos minecraft": "Exemplo: /give @s diamond 64 → dá 64 diamantes; /tp @s x y z → teletransporta.",
        "script roblox": "Um exemplo básico: game.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 100"
    };
    return respostas[pergunta.toLowerCase()] || "Estou funcionando! Em breve terei respostas completas para tudo 😊";
}

function adicionar(quem, conteudo) {
    const caixa = document.getElementById("caixa");
    const bloco = document.createElement("div");
    bloco.className = quem === "Você" ? "text-right" : "text-left";
    bloco.innerHTML = `
        <div class="inline-block max-w-[85%] p-3 rounded-lg ${
            quem === "Você" ? "bg-destaque text-white" : "bg-gray-700 text-white"
        }">
            <strong>${quem}:</strong><br>
            ${conteudo}
        </div>
    `;
    caixa.appendChild(bloco);
    caixa.scrollTop = caixa.scrollHeight;
}

function removerUltima() {
    const caixa = document.getElementById("caixa");
    caixa.removeChild(caixa.lastChild);
}

document.getElementById("pergunta").addEventListener("keydown", e => {
    if (e.key === "Enter") enviar();
});
</script>

</body>
</html>
