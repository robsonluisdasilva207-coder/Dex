<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Filha Scripts IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#ff2222',
                        escuro: '#121212',
                        claro: '#f8f8f8',
                        cinza: '#e0e0e0',
                        texto: '#222222'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .menu-aberto {
                transform: translateX(0);
            }
            .menu-fechado {
                transform: translateX(-100%);
            }
            .girar {
                transform: rotate(45deg);
            }
            .transicao {
                transition: all 0.3s ease;
            }
            .mensagem-ia {
                border-left: 3px solid #ff2222;
            }
            .fundo-marca {
                background-image: radial-gradient(#ff222215 1px, transparent 1px);
                background-size: 20px 20px;
            }
        }
    </style>
</head>
<body class="bg-claro text-texto font-sans overflow-x-hidden">

<!-- MENU LATERAL ANIMADO -->
<div id="menuLateral" class="fixed top-0 left-0 h-full w-72 bg-white shadow-xl z-50 menu-fechado transicao">
    <div class="p-5 border-b border-cinza">
        <h3 class="text-xl font-bold text-center">📝 Novo Chat</h3>
    </div>
    <div class="p-4 space-y-3 overflow-y-auto h-[calc(100vh-80px)]">
        <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-cinza/50 cursor-pointer transition">
            <i class="fa fa-comment-o text-principal"></i>
            <span class="text-sm">Conversa Minecraft</span>
        </div>
        <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-cinza/50 cursor-pointer transition">
            <i class="fa fa-comment-o text-principal"></i>
            <span class="text-sm">Scripts Roblox</span>
        </div>
        <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-cinza/50 cursor-pointer transition">
            <i class="fa fa-comment-o text-principal"></i>
            <span class="text-sm">Configurações Free Fire</span>
        </div>
        <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-cinza/50 cursor-pointer transition">
            <i class="fa fa-comment-o text-principal"></i>
            <span class="text-sm">Dicas e Truques</span>
        </div>
    </div>
</div>

<!-- FUNDO ESCURO QUANDO MENU ABERTO -->
<div id="fundoEscuro" class="fixed inset-0 bg-black/40 z-40 hidden transicao"></div>

<!-- CABEÇALHO PRINCIPAL -->
<header class="sticky top-0 bg-white shadow-sm z-30 px-4 py-3 flex items-center justify-between">
    <button id="botaoMenu" class="text-2xl text-principal hover:scale-105 transition">
        <i class="fa fa-bars"></i>
    </button>
    <h1 class="text-lg font-bold">Filha Scripts IA</h1>
    <div class="flex gap-2">
        <span class="w-2 h-2 rounded-full bg-principal"></span>
        <span class="w-2 h-2 rounded-full bg-principal"></span>
        <span class="w-2 h-2 rounded-full bg-principal"></span>
    </div>
</header>

<!-- ÁREA DE CONVERSA -->
<main class="p-4 pb-28 min-h-[calc(100vh-120px)] fundo-marca">
    <div id="caixaConversa" class="space-y-4 max-w-3xl mx-auto">
        <div class="mensagem-ia bg-white p-3 rounded-lg shadow-sm max-w-[90%]">
            <p class="text-sm">👋 Olá! Selecione um jogo abaixo e me peça o que precisar: comandos, scripts, sensibilidade ou configurações!</p>
        </div>
    </div>
</main>

<!-- SELEÇÃO DE JOGOS COM ÍCONES -->
<div class="fixed bottom-16 left-0 right-0 bg-white border-t border-cinza p-4 shadow-lg z-20">
    <div class="flex justify-center gap-4 max-w-3xl mx-auto">
        <button id="jogoMinecraft" onclick="mudarJogo('minecraft')" class="flex flex-col items-center gap-1 p-2 rounded-xl hover:bg-principal/10 transition border border-transparent">
            <div class="w-12 h-12 bg-green-700 rounded-lg flex items-center justify-center text-white text-xl">
                🟩
            </div>
            <span class="text-xs font-medium">Minecraft</span>
        </button>
        <button id="jogoRoblox" onclick="mudarJogo('roblox')" class="flex flex-col items-center gap-1 p-2 rounded-xl hover:bg-principal/10 transition border border-transparent">
            <div class="w-12 h-12 bg-red-500 rounded-lg flex items-center justify-center text-white text-xl font-bold">
                R
            </div>
            <span class="text-xs font-medium">Roblox</span>
        </button>
        <button id="jogoFF" onclick="mudarJogo('ff')" class="flex flex-col items-center gap-1 p-2 rounded-xl hover:bg-principal/10 transition border border-transparent">
            <div class="w-12 h-12 bg-black rounded-lg flex items-center justify-center text-white text-xl font-bold">
                FF
            </div>
            <span class="text-xs font-medium">Free Fire</span>
        </button>
    </div>
    <div class="text-center mt-2 text-xs text-gray-500">
        Jogo selecionado: <span id="jogoAtual" class="font-semibold text-principal">Nenhum</span>
    </div>
</div>

<!-- CAMPO DE DIGITAÇÃO -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-cinza p-3 z-30">
    <div class="flex items-center gap-2 max-w-3xl mx-auto">
        <input type="text" id="campoMensagem" placeholder="Digite sua mensagem..." class="flex-1 border border-cinza rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-principal/40 text-sm">
        <button id="botaoMais" class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-xl transicao">
            +
        </button>
        <button onclick="enviarMensagem()" class="w-10 h-10 rounded-full bg-principal text-white flex items-center justify-center hover:bg-principal/90 transition">
            <i class="fa fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
// === CONFIGURAÇÃO DA IA — COLOQUE SUA CHAVE AQUI ===
const CHAVE_IA = "AQ.Ab8RN6IrkkqWKKM8DU23cVWd3aIIJnxaKy0ej_S_Zu9iDES9ng"; // <-- TROQUE PELA SUA CHAVE
const URL_IA = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${CHAVE_IA}`;

let jogoSelecionado = null;

// === ABRIR E FECHAR MENU LATERAL ===
const menuLateral = document.getElementById('menuLateral');
const fundoEscuro = document.getElementById('fundoEscuro');
const botaoMenu = document.getElementById('botaoMenu');

botaoMenu.addEventListener('click', () => {
    menuLateral.classList.toggle('menu-aberto');
    menuLateral.classList.toggle('menu-fechado');
    fundoEscuro.classList.toggle('hidden');
});

fundoEscuro.addEventListener('click', () => {
    menuLateral.classList.remove('menu-aberto');
    menuLateral.classList.add('menu-fechado');
    fundoEscuro.classList.add('hidden');
});

// === BOTÃO + GIRATÓRIO ===
const botaoMais = document.getElementById('botaoMais');
let aberto = false;
botaoMais.addEventListener('click', () => {
    aberto = !aberto;
    botaoMais.classList.toggle('girar');
    botaoMais.classList.toggle('bg-principal');
    botaoMais.classList.toggle('text-white');
});

// === SELECIONAR JOGO E DEFINIR RESPOSTA DA IA ===
function mudarJogo(jogo) {
    jogoSelecionado = jogo;
    document.getElementById('jogoAtual').textContent = jogo.toUpperCase();
    document.querySelectorAll('[id^="jogo"]').forEach(btn => btn.classList.remove('border-principal'));
    document.getElementById(`jogo${jogo.charAt(0).toUpperCase() + jogo.slice(1)}`).classList.add('border-principal');
}

// === ENVIAR MENSAGEM PARA A IA ===
async function enviarMensagem() {
    const campo = document.getElementById('campoMensagem');
    const texto = campo.value.trim();
    if (!texto) return;

    adicionarMensagem('voce', texto);
    campo.value = '';
    adicionarMensagem('ia', 'Pensando... ⏳');

    let instrucao = '';
    switch(jogoSelecionado) {
        case 'minecraft':
            instrucao = `Você é especialista em Minecraft Bedrock. Responda com comandos, addons, texturas, redstone, sempre compatível com a versão Bedrock. Se pedir código, explique como instalar. Pergunta: ${texto}`;
            break;
        case 'roblox':
            instrucao = `Você é especialista em scripts para Roblox / Delta Mobile. Use código Lua compatível, organizado e funcional. Sempre explique onde colocar o código. Pergunta: ${texto}`;
            break;
        case 'ff':
            instrucao = `Você é especialista em Free Fire. Dê DPI, sensibilidade, configurações por modelo de celular, dicas de mira e ajustes. Pergunta: ${texto}`;
            break;
        default:
            instrucao = `Responda de forma clara, direta e objetiva: ${texto}`;
    }

    try {
        const resposta = await fetch(URL_IA, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: instrucao }] }] })
        });
        const dados = await resposta.json();
        if (dados.error) throw new Error(dados.error.message);
        const respostaFinal = dados.candidates[0].content.parts[0].text;
        removerUltimaMensagem();
        adicionarMensagem('ia', respostaFinal);
    } catch (erro) {
        removerUltimaMensagem();
        adicionarMensagem('ia', '❌ Erro! Verifique se a chave da API está correta e se a internet está funcionando.');
    }
}

// === FUNÇÕES PARA MOSTRAR MENSAGENS ===
function adicionarMensagem(tipo, conteudo) {
    const caixa = document.getElementById('caixaConversa');
    const div = document.createElement('div');
    div.className = `max-w-[90%] p-3 rounded-lg shadow-sm whitespace-pre-wrap ${
        tipo === 'voce' 
        ? 'bg-principal/10 ml-auto text-right' 
        : 'bg-white mensagem-ia mr-auto'
    }`;
    div.textContent = conteudo;
    caixa.appendChild(div);
    caixa.scrollTop = caixa.scrollHeight;
}

function removerUltimaMensagem() {
    const caixa = document.getElementById('caixaConversa');
    caixa.removeChild(caixa.lastChild);
}

// === ENVIAR MENSAGEM COM A TECLA ENTER ===
document.getElementById('campoMensagem').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') enviarMensagem();
});
</script>

</body>
            </html>
