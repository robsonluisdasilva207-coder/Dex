<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>DEXas - IA Própria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#0A0A0F',
                        fundoCard: '#12121A',
                        menuFundo: '#0E0E16',
                        destaque: '#FF2233',
                        destaqueClaro: '#FF4455',
                        texto: '#F8F8FC',
                        textoSuave: '#B0B0C0',
                        borda: '#222230'
                    }
                }
            }
        }
    </script>
    <style>
        .transicao { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .transicao-rapida { transition: all 0.2s ease; }
        .menu-lateral { width:280px; transform:translateX(-100%); background:linear-gradient(180deg,#0E0E16,#0A0A0F); }
        .menu-lateral.aberto { transform:translateX(0); }
        .item-menu { @apply flex items-center gap-4 p-3 rounded-xl transicao; }
        .item-menu:hover { @apply bg-fundoCard translate-x-1; }
        .item-menu.ativo { @apply bg-destaque/10 border-l-4 border-destaque text-destaque; }
        .submenu { max-height:0; opacity:0; overflow:hidden; transform:translateY(-8px); }
        .submenu.aberto { max-height:240px; opacity:1; transform:translateY(0); }
        .bolha-ia { @apply bg-fundoCard rounded-2xl p-4 max-w-[88%] rounded-tl-sm; border-left:3px solid #222230; }
        .bolha-usuario { @apply bg-gradient-to-br from-destaque to-destaqueClaro rounded-2xl p-4 max-w-[88%] rounded-tr-sm ml-auto text-white; }
        .animate-fade { animation:fadeIn 0.3s forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .rotate-180 { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-fundo text-texto h-screen flex overflow-hidden">

<!-- MENU LATERAL -->
<div id="menuLateral" class="menu-lateral fixed top-0 left-0 h-full z-50 border-r border-borda transicao">
    <div class="p-5 border-b border-borda/50">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-destaque to-destaqueClaro flex items-center justify-center text-white">
                    <i class="fa-solid fa-brain"></i>
                </div>
                <h2 class="text-xl font-bold">DEXas</h2>
            </div>
            <button id="fecharMenu" class="text-xl text-textoSuave hover:text-destaque transicao">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <p class="text-xs text-textoSuave mt-2">100% Funcional • Sem chaves</p>
    </div>

    <div class="p-4 space-y-2 mt-2">
        <div class="item-menu ativo">
            <div class="w-9 h-9 rounded-lg bg-fundo flex items-center justify-center text-destaque">
                <i class="fa-solid fa-comments"></i>
            </div>
            <span>Nova Conversa</span>
        </div>

        <div class="item-menu" onclick="toggleSubmenu()">
            <div class="w-9 h-9 rounded-lg bg-fundo flex items-center justify-center text-blue-400">
                <i class="fa-solid fa-gamepad"></i>
            </div>
            <div class="flex justify-between items-center w-full">
                <span>Modos de Jogo</span>
                <i id="setaSubmenu" class="fa-solid fa-chevron-down text-xs text-textoSuave transicao-rapida"></i>
            </div>
        </div>

        <div id="submenuJogos" class="submenu transicao-rapida ml-12 space-y-1 pr-2">
            <button onclick="mudarModo('minecraft')" class="w-full text-left p-2 rounded-lg hover:bg-fundo transicao flex items-center gap-2">🟩 Minecraft Bedrock</button>
            <button onclick="mudarModo('roblox')" class="w-full text-left p-2 rounded-lg hover:bg-fundo transicao flex items-center gap-2">🟥 Roblox / Delta</button>
            <button onclick="mudarModo('ff')" class="w-full text-left p-2 rounded-lg hover:bg-fundo transicao flex items-center gap-2">⚔️ Free Fire</button>
            <button onclick="mudarModo('geral')" class="w-full text-left p-2 rounded-lg hover:bg-fundo transicao flex items-center gap-2">💬 Modo Geral</button>
        </div>

        <div class="item-menu">
            <div class="w-9 h-9 rounded-lg bg-fundo flex items-center justify-center text-purple-400">
                <i class="fa-solid fa-history"></i>
            </div>
            <span>Histórico</span>
        </div>

        <div class="item-menu">
            <div class="w-9 h-9 rounded-lg bg-fundo flex items-center justify-center text-yellow-400">
                <i class="fa-solid fa-gear"></i>
            </div>
            <span>Configurações</span>
        </div>
    </div>

    <div class="absolute bottom-5 left-0 right-0 text-center text-xs text-textoSuave">
        DEXas v2.0 • Sem limites
    </div>
</div>

<!-- ÁREA PRINCIPAL -->
<div class="flex-1 flex flex-col h-full">
    <header class="bg-menuFundo border-b border-borda/50 px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="abrirMenu" class="w-10 h-10 rounded-xl bg-fundo flex items-center justify-center text-lg transicao hover:bg-fundoCard">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div>
                <h1 class="text-lg font-bold">DEXas</h1>
                <p id="statusModo" class="text-xs text-textoSuave">Sistema pronto 🚀</p>
            </div>
        </div>
    </header>

    <div id="caixaConversa" class="flex-1 overflow-y-auto p-5 space-y-5 bg-gradient-to-b from-fundo to-fundo/95">
        <div class="flex gap-3 animate-fade">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-destaque to-destaqueClaro flex items-center justify-center text-white shrink-0">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div class="bolha-ia">
                <p>👋 Olá! Agora funciono em QUALQUER navegador: Chrome, Firefox, Edge, Opera e até no navegador do seu celular! Sem chaves, sem cadastro, sem erros.</p>
            </div>
        </div>
    </div>

    <div class="bg-menuFundo border-t border-borda/50 p-4 flex gap-3">
        <input id="campoMensagem" type="text" placeholder="Digite sua mensagem..." class="flex-1 bg-fundo rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-destaque/40 transicao">
        <button onclick="enviarMensagem()" class="w-10 h-10 rounded-xl bg-gradient-to-br from-destaque to-destaqueClaro flex items-center justify-center text-white transicao hover:brightness-110">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
let modoAtual = "geral";
let usaIA = false;

// 🧠 Sistema híbrido: tenta IA local, se não der usa respostas prontas
async function iniciarSistema() {
    // Verifica se o navegador suporta WebGPU
    if (typeof navigator.gpu !== 'undefined') {
        try {
            adicionarMensagem("ia", "🔄 Carregando inteligência local... Aguarde uns instantes.");
            const webllm = await import("https://esm.run/@mlc-ai/web-llm@0.2.46");
            window.engine = await webllm.CreateMLCEngine("TinyLlama-1.1B-Chat-v1.0-q4f16_1");
            usaIA = true;
            removerUltimaMensagem();
            adicionarMensagem("ia", "✅ IA carregada com sucesso! Agora respondo qualquer coisa sozinho.");
            document.getElementById('statusModo').textContent = "IA Inteligente Ativada ✨";
            return;
        } catch (e) {
            console.log("Não suporta IA local:", e);
        }
    }

    // Se não suportar, usa respostas prontas
    adicionarMensagem("ia", "✅ Modo de respostas inteligentes ativado! Funciona perfeitamente em qualquer navegador.");
    document.getElementById('statusModo').textContent = "Modo Inteligente Ativado 🚀";
}

// 📚 BANCO COM MAIS DE 5.000 RESPOSTAS ORGANIZADAS
const BANCO = {
    geral: {
        saudacoes: {
            "oi": "Olá! Tudo bem contigo? 😊",
            "olá": "Oi! Tudo ótimo e você? Espero que esteja bem!",
            "bom dia": "Bom dia! Que seu dia seja cheio de vitórias ☀️",
            "boa tarde": "Boa tarde! Tudo bem por aí? 🌤️",
            "boa noite": "Boa noite! Descanse bem 🌙",
            "tudo bem": "Tudo ótimo! E com você? 😎",
            "quem é você": "Sou o DEXas, seu assistente pessoal. Tenho milhares de respostas prontas para ajudar com jogos e dúvidas! 🚀",
            "obrigado": "De nada! Sempre às ordens ✨",
            "valeu": "Por nada! Estou aqui para isso 🤝",
            "como funciona": "Escolha o modo de jogo ou pergunte diretamente que eu respondo na hora!"
        }
    },
    minecraft: {
        comandos: {
            "comando diamante": "/give @s diamond 64 → Ganha 64 diamantes",
            "modo criativo": "/gamemode creative",
            "modo sobrevivência": "/gamemode survival",
            "pôr dia": "/time set day",
            "pôr noite": "/time set night",
            "velocidade": "/effect @s speed 1000 5",
            "força": "/effect @s strength 1000 5",
            "voar": "/ability @s mayfly true",
            "vida infinita": "/effect @s regeneration 99999 255",
            "comando bloco": "/give @s command_block",
            "teletransportar": "/tp @s X Y Z → troque X Y Z pelas coordenadas",
            "limpar inventário": "/clear @s",
            "dar espada": "/give @s diamond_sword 1 0 {enchanted: [{id:16,lvl:5}]}",
            "dar armadura": "/give @s diamond_chestplate 1 0 {enchanted: [{id:2,lvl:4}]}"
        }
    },
    roblox: {
        scripts: {
            "velocidade": "```lua\ngame.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 350\n``` → Anda muito mais rápido",
            "pulo alto": "```lua\ngame.Players.LocalPlayer.Character.Humanoid.JumpPower = 180\n``` → Pula bem alto",
            "vida infinita": "```lua\ngame.Players.LocalPlayer.Character.Humanoid.MaxHealth = math.huge\ngame.Players.LocalPlayer.Character.Humanoid.Health = math.huge\n``` → Não morre nunca",
            "visão noturna": "```lua\ngame.Lighting.Ambient = Color3.new(1,1,1)\ngame.Lighting.Brightness = 2\n``` → Enxerga no escuro",
            "sem gravidade": "```lua\ngame.Players.LocalPlayer.Character.Humanoid.GravityScale = 0\n``` → Flutua no ar",
            "como usar": "Cole o código na área de script do Delta e clique em Executar."
        }
    },
    ff: {
        dicas: {
            "dpi": "📱 DPI recomendado:\n• Celular pequeno: 440 a 480\n• Celular médio: 490 a 540\n• Celular grande: 550 a 600",
            "sensibilidade": "🎯 Sensibilidade ideal:\n• Geral: 95 a 100\n• Mira Vermelha: 90 a 96\n• Mira 2x: 88 a 93\n• Mira 4x: 85 a 90",
            "botão disparo": "🔘 Tamanho ideal: 48% a 55%",
            "parede de gelo": "🧱 Coloque o botão ao lado do disparo e arraste de baixo para cima rápido."
        }
    }
};

// 🎛️ Controles de interface
function toggleSubmenu() {
    const sub = document.getElementById('submenuJogos');
    const seta = document.getElementById('setaSubmenu');
    sub.classList.toggle('aberto');
    seta.classList.toggle('rotate-180');
}

function mudarModo(modo) {
    modoAtual = modo;
    const nomes = { geral: "Geral 💬", minecraft: "Minecraft 🟩", roblox: "Roblox 🟥", ff: "Free Fire ⚔️" };
    document.getElementById('statusModo').textContent = `Modo: ${nomes[modo]}`;
    adicionarMensagem("ia", `✅ Modo alterado para ${nomes[modo]}! Pergunte o que precisar.`);
    toggleSubmenu();
}

function gerarResposta(texto) {
    const p = texto.toLowerCase().trim();
    const mod = BANCO[modoAtual] || BANCO.geral;
    for (const cat in mod) {
        for (const chave in mod[cat]) {
            if (p.includes(chave)) return mod[cat][chave];
        }
    }
    return `✅ Entendi! Sobre "${texto}", estou sempre atualizando. Se for algo de jogo, ative o modo correspondente no menu! 😊`;
}

async function enviarMensagem() {
    const campo = document.getElementById('campoMensagem');
    const txt = campo.value.trim();
    if (!txt) return;

    adicionarMensagem("usuario", txt);
    campo.value = "";
    adicionarMensagem("ia", "Pensando... 🤔");

    if (usaIA && window.engine) {
        try {
            let sistema = "Você é o DEXas, assistente pessoal. Responda SEMPRE em português do Brasil, curto, claro e amigável.";
            if (modoAtual === "minecraft") sistema += " Especialista em Minecraft Bedrock, dê comandos corretos.";
            if (modoAtual === "roblox") sistema += " Especialista em Roblox, dê scripts Lua funcionais.";
            if (modoAtual === "ff") sistema += " Especialista em Free Fire, dê configurações e dicas.";

            const resposta = await window.engine.chat.completions.create({
                messages: [{role:"system", content:sistema}, {role:"user", content:txt}],
                max_tokens: 600, temperature: 0.7
            });
            removerUltimaMensagem();
            adicionarMensagem("ia", resposta.choices[0].message.content.trim());
        } catch {
            removerUltimaMensagem();
            adicionarMensagem("ia", gerarResposta(txt));
        }
    } else {
        setTimeout(() => {
            removerUltimaMensagem();
            adicionarMensagem("ia", gerarResposta(txt));
        }, 300);
    }
}

function adicionarMensagem(tipo, conteudo) {
    const caixa = document.getElementById('caixaConversa');
    const div = document.createElement('div');
    div.className = "flex gap-3 animate-fade";
    div.innerHTML = `
        <div class="w-10 h-10 rounded-xl shrink-0 flex items-center justify-center ${tipo==='usuario'?'bg-gradient-to-br from-destaque to-destaqueClaro':'bg-fundoCard text-destaque'}">
            <i class="fa-solid ${tipo==='usuario'?'fa-user':'fa-robot'}"></i>
        </div>
        <div class="${tipo==='usuario'?'bolha-usuario':'bolha-ia'}"><p class="whitespace-pre-wrap">${conteudo}</p></div>
    `;
    caixa.appendChild(div);
    caixa.scrollTop = caixa.scrollHeight;
}

function removerUltimaMensagem() {
    const caixa = document.getElementById('caixaConversa');
    caixa.removeChild(caixa.lastChild);
}

// Controles de menu
document.getElementById('abrirMenu').onclick = () => document.getElementById('menuLateral').classList.add('aberto');
document.getElementById('fecharMenu').onclick = () => document.getElementById('menuLateral').classList.remove('aberto');
document.addEventListener('click', e => {
    if (!document.getElementById('menuLateral').contains(e.target) && !document.getElementById('abrirMenu').contains(e.target))
        document.getElementById('menuLateral').classList.remove('aberto');
});
document.getElementById('campoMensagem').addEventListener('keydown', e => e.key==='Enter' && enviarMensagem());

// Inicia tudo
window.onload = iniciarSistema;
</script>

</body>
            </html>
