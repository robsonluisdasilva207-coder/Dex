<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste DEXas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#0F0F14',
                        painel: '#181820',
                        destaque: '#FF2222',
                        texto: '#F0F0F8',
                        textoCinza: '#9090A0',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-fundo text-texto h-screen flex flex-col p-4">

    <h1 class="text-xl font-bold text-center mb-4">🧪 Teste DEXas</h1>

    <!-- Área de mensagens -->
    <div id="caixa" class="flex-1 bg-painel rounded-xl p-4 mb-4 overflow-y-auto space-y-3">
        <div class="text-textoCinza">Aguardando sua pergunta...</div>
    </div>

    <!-- Entrada -->
    <div class="flex gap-2">
        <input type="text" id="pergunta" placeholder="Digite algo para testar..." 
            class="flex-1 bg-painel border border-textoCinza/30 rounded-lg px-3 py-2 outline-none focus:ring-1 focus:ring-destaque">
        <button onclick="enviar()" class="bg-destaque px-4 rounded-lg text-white">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
        <button onclick="pararVoz()" class="bg-gray-600 px-3 rounded-lg text-white" title="Parar voz">
            <i class="fa-solid fa-volume-xmark"></i>
        </button>
    </div>

<script>
// ----------------------
// CONFIGURAÇÃO - IA SEM BLOQUEIO
// ----------------------
const URL_IA = "https://api.kastg.xyz/api/ai/chat";
let voz = window.speechSynthesis;

// ----------------------
// FUNÇÃO DE FALAR
// ----------------------
function falar(texto) {
    if (!voz) return;
    pararVoz();
    const fala = new SpeechSynthesisUtterance(texto);
    fala.lang = "pt-BR";
    fala.rate = 1.1;
    fala.volume = 1;
    voz.speak(fala);
}

function pararVoz() {
    if (voz) voz.cancel();
}

// ----------------------
// ENVIAR E RECEBER
// ----------------------
async function enviar() {
    const campo = document.getElementById("pergunta");
    const texto = campo.value.trim();
    if (!texto) return;

    adicionar("Você", texto);
    campo.value = "";
    adicionar("DEXas", "Pensando... 🤔");

    try {
        const resposta = await fetch(`${URL_IA}?prompt=${encodeURIComponent(`Responda em português do Brasil, de forma curta e clara: ${texto}`)}`);
        const dados = await resposta.json();
        removerUltima();

        if (!dados.result) throw new Error("Não consegui obter resposta");

        const respostaTexto = dados.result;
        adicionar("DEXas", respostaTexto);
        falar(respostaTexto);

    } catch (erro) {
        removerUltima();
        const msgErro = "❌ " + (erro.message || "Erro de conexão, tente novamente");
        adicionar("DEXas", msgErro);
        falar(msgErro);
    }
}

// ----------------------
// AJUDANTES
// ----------------------
function adicionar(quem, conteudo) {
    const caixa = document.getElementById("caixa");
    const bloco = document.createElement("div");
    bloco.className = quem === "Você" ? "text-right" : "text-left";
    bloco.innerHTML = `
        <div class="inline-block max-w-[85%] p-3 rounded-lg ${
            quem === "Você" ? "bg-destaque text-white" : "bg-gray-700 text-white"
        }">
            <strong>${quem}:</strong><br>
            ${conteudo}
        </div>
    `;
    caixa.appendChild(bloco);
    caixa.scrollTop = caixa.scrollHeight;
}

function removerUltima() {
    const caixa = document.getElementById("caixa");
    caixa.removeChild(caixa.lastChild);
}

// Enter para enviar
document.getElementById("pergunta").addEventListener("keydown", e => {
    if (e.key === "Enter") enviar();
});
</script>

</body>
</html>
