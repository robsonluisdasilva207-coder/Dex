<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste DEXas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#0F0F14',
                        painel: '#181820',
                        destaque: '#FF2222',
                        texto: '#F0F0F8',
                        textoCinza: '#9090A0',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-fundo text-texto h-screen flex flex-col p-4">

    <h1 class="text-xl font-bold text-center mb-4">🧪 Teste DEXas</h1>

    <div id="caixa" class="flex-1 bg-painel rounded-xl p-4 mb-4 overflow-y-auto space-y-3">
        <div class="text-textoCinza">Aguardando sua pergunta...</div>
    </div>

    <div class="flex gap-2">
        <input type="text" id="pergunta" placeholder="Digite algo para testar..." 
            class="flex-1 bg-painel border border-textoCinza/30 rounded-lg px-3 py-2 outline-none focus:ring-1 focus:ring-destaque">
        <button onclick="enviar()" class="bg-destaque px-4 rounded-lg text-white">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

<script>
// ✅ 3 OPÇÕES DE IA DIFERENTES PARA TENTAR
const APIS = [
    {
        url: "https://api.affiliateplus.xyz/api/chatbot",
        body: (msg) => ({ message: msg, botname: "DEXas", owner: "Você" }),
        parser: (d) => d.reply
    },
    {
        url: "https://vukkyapi.xyz/api/ai/gpt",
        body: (msg) => ({ prompt: msg }),
        parser: (d) => d.result
    },
    {
        url: "https://api.pawan.krd/v1/chat/completions",
        body: (msg) => ({ model: "gpt-3.5-turbo", messages: [{ role: "user", content: msg }] }),
        parser: (d) => d.choices[0].message.content
    }
];

async function enviar() {
    const campo = document.getElementById("pergunta");
    const texto = campo.value.trim();
    if (!texto) return;

    adicionar("Você", texto);
    campo.value = "";
    adicionar("DEXas", "Pensando... 🤔");

    let respostaFinal = null;

    // Tenta uma por uma
    for (const api of APIS) {
        try {
            const res = await fetch(api.url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(api.body(`Responda em português do Brasil, curto e claro: ${texto}`))
            });
            const dados = await res.json();
            const resposta = api.parser(dados);
            if (resposta) {
                respostaFinal = resposta;
                break;
            }
        } catch { continue; }
    }

    removerUltima();

    // Se nenhuma IA funcionar, usa respostas prontas
    if (!respostaFinal) {
        respostaFinal = respostaSegura(texto);
    }

    adicionar("DEXas", respostaFinal);
}

// Respostas que NUNCA falham
function respostaSegura(pergunta) {
    const p = pergunta.toLowerCase().trim();
    const respostas = {
        "oi": "Olá! Tudo bem? Eu sou o DEXas, seu assistente pessoal 🤝",
        "olá": "Olá! Tudo bem contigo? Em que posso ajudar?",
        "quem é você": "Sou o DEXas, criado para te ajudar com jogos, códigos, dúvidas e o que precisar!",
        "comandos minecraft": "• /give @s diamond 64 → ganha diamantes\n• /tp @s ~ ~ ~ → teletransporta\n• /gamemode creative → modo criativo",
        "script roblox": "Velocidade:\n```lua\ngame.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 200\n```",
        "dicas free fire": "DPI: 480 | Sensibilidade: Geral 96, Mira 92"
    };
    return respostas[p] || `✅ Estou funcionando! Recebi sua mensagem: "${pergunta}". Em breve com respostas completas 😊`;
}

function adicionar(quem, conteudo) {
    const caixa = document.getElementById("caixa");
    const bloco = document.createElement("div");
    bloco.className = quem === "Você" ? "text-right" : "text-left";
    bloco.innerHTML = `
        <div class="inline-block max-w-[85%] p-3 rounded-lg ${
            quem === "Você" ? "bg-destaque text-white" : "bg-gray-700 text-white"
        }">
            <strong>${quem}:</strong><br>
            <p class="whitespace-pre-wrap">${conteudo}</p>
        </div>
    `;
    caixa.appendChild(bloco);
    caixa.scrollTop = caixa.scrollHeight;
}

function removerUltima() {
    const caixa = document.getElementById("caixa");
    caixa.removeChild(caixa.lastChild);
}

document.getElementById("pergunta").addEventListener("keydown", e => {
    if (e.key === "Enter") enviar();
});
</script>

</body>
</html>
