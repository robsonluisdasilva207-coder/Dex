<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>DEX IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#ff2222',
                        escuro: '#0f0f13',
                        medio: '#1a1a22',
                        cinza: '#2a2a35',
                        cinzaClaro: '#888899',
                        texto: '#e5e5ee'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Segoe UI', 'Roboto', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .transicao { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
            .mensagem-ia { border-left: 3px solid #ff2222; }
            .menu-jogos { max-height: 0; overflow: hidden; opacity: 0; }
            .menu-jogos.aberto { max-height: 220px; opacity: 1; }
            .ponto { @apply w-2 h-2 rounded-full bg-principal; }
            .rolagem-suave { scroll-behavior: smooth; }
        }
    </style>
</head>
<body class="bg-escuro text-texto font-sans overflow-x-hidden rolagem-suave">

<!-- MENU LATERAL -->
<div class="fixed top-0 left-0 h-full w-20 bg-medio shadow-lg z-50 flex flex-col items-center py-6 justify-between border-r border-cinza/50">
    <div class="flex flex-col gap-10 items-center">
        <!-- Logo DEX -->
        <div class="flex flex-col items-center gap-2">
            <div class="grid grid-cols-2 gap-1">
                <div class="ponto"></div><div class="ponto"></div>
                <div class="ponto"></div><div class="ponto"></div>
            </div>
            <span class="text-xl font-bold text-principal tracking-wider">DEX</span>
        </div>

        <!-- Botões do menu -->
        <div class="flex flex-col gap-8 items-center">
            <button id="botaoMenu" class="text-2xl hover:scale-110 hover:text-principal transicao">
                <i class="fa fa-bars"></i>
            </button>
            <button class="text-xl text-principal hover:scale-110 transicao">
                <i class="fa fa-comments"></i>
            </button>
            <button id="botaoMais" class="w-11 h-11 rounded-full bg-cinza flex items-center justify-center text-xl transicao hover:bg-principal hover:text-white shadow-sm">
                +
            </button>
        </div>
    </div>

    <div class="text-xs text-cinzaClaro">v1.0</div>
</div>

<!-- MENU DE JOGOS -->
<div id="menuJogos" class="fixed left-24 top-28 w-48 bg-medio rounded-xl shadow-xl z-40 menu-jogos transicao p-2 border border-cinza/60">
    <button onclick="mudarJogo('minecraft')" class="w-full text-left p-3 rounded-lg hover:bg-cinza flex items-center gap-3 transicao">
        <span class="text-green-500 text-lg">🟩</span>
        <span>Minecraft</span>
    </button>
    <button onclick="mudarJogo('roblox')" class="w-full text-left p-3 rounded-lg hover:bg-cinza flex items-center gap-3 transicao">
        <span class="text-red-500 font-bold">R</span>
        <span>Roblox</span>
    </button>
    <button onclick="mudarJogo('ff')" class="w-full text-left p-3 rounded-lg hover:bg-cinza flex items-center gap-3 transicao">
        <span class="text-white font-bold">FF</span>
        <span>Free Fire</span>
    </button>
</div>

<!-- ÁREA PRINCIPAL -->
<main class="ml-20 h-screen flex flex-col">
    <!-- Cabeçalho -->
    <header class="h-16 bg-medio flex items-center justify-between px-6 border-b border-cinza/50 shadow-sm">
        <h2 class="text-lg font-semibold tracking-wide">DEX IA <span id="jogoAtual" class="text-sm text-cinzaClaro ml-2 font-normal">| Nenhum jogo selecionado</span></h2>
        <div class="flex gap-5">
            <button class="text-lg hover:text-principal transicao">
                <i class="fa fa-search"></i>
            </button>
            <button class="text-lg hover:text-principal transicao">
                <i class="fa fa-phone"></i>
            </button>
        </div>
    </header>

    <!-- Área de conversa -->
    <div id="caixaConversa" class="flex-1 p-5 overflow-y-auto space-y-5 bg-escuro/95">
        <div class="mensagem-ia bg-medio p-4 rounded-lg shadow-sm max-w-[88%]">
            <p class="text-sm leading-relaxed">👋 Olá! Selecione um jogo no botão + e me peça o que precisar: scripts, comandos, configurações ou ajuda com qualquer coisa!</p>
        </div>
    </div>

    <!-- Campo de entrada -->
    <div class="h-20 bg-medio border-t border-cinza/50 px-4 flex items-center gap-3 shadow-inner">
        <input type="file" id="entradaImagem" accept="image/*" class="hidden">
        <button onclick="document.getElementById('entradaImagem').click()" class="w-10 h-10 rounded-full bg-cinza flex items-center justify-center text-lg transicao hover:bg-principal hover:text-white shadow-sm">
            <i class="fa fa-image"></i>
        </button>

        <button id="botaoMicrofone" class="w-10 h-10 rounded-full bg-cinza flex items-center justify-center text-lg transicao hover:bg-principal hover:text-white shadow-sm">
            <i class="fa fa-microphone"></i>
        </button>

        <input type="text" id="campoMensagem" placeholder="Digite sua mensagem..." class="flex-1 bg-cinza rounded-full px-4 py-2.5 outline-none focus:ring-2 focus:ring-principal/40 transition-shadow">

        <button onclick="enviarMensagem()" class="w-10 h-10 rounded-full bg-principal flex items-center justify-center text-white text-lg transicao hover:bg-principal/90 shadow-md">
            <i class="fa fa-paper-plane"></i>
        </button>
    </div>
</main>

<script>
// === CONFIGURAÇÃO GROQ — PRONTA E CORRETA ===
const CHAVE_IA = "gsk_SoNK1jwAw1mk7ZbnIMVWGdyb3FYuBkQnW4OUfk8PZnCPR29QCr";
const URL_IA = "https://api.groq.com/openai/v1/chat/completions";
const MODELO_IA = "llama3-70b-8192";

let jogoSelecionado = null;

// === ABRIR / FECHAR MENU DE JOGOS ===
const botaoMais = document.getElementById('botaoMais');
const menuJogos = document.getElementById('menuJogos');
botaoMais.addEventListener('click', () => {
    menuJogos.classList.toggle('aberto');
    botaoMais.classList.toggle('bg-principal');
    botaoMais.classList.toggle('text-white');
});

// === SELECIONAR JOGO ===
function mudarJogo(jogo) {
    jogoSelecionado = jogo;
    const nomes = {
        minecraft: "Minecraft Bedrock",
        roblox: "Roblox / Delta",
        ff: "Free Fire"
    };
    document.getElementById('jogoAtual').textContent = `| ${nomes[jogo]}`;
    menuJogos.classList.remove('aberto');
    botaoMais.classList.remove('bg-principal', 'text-white');
}

// === RECONHECIMENTO DE VOZ ===
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const reconhecimento = new SpeechRecognition();
    reconhecimento.lang = 'pt-BR';
    reconhecimento.continuous = false;
    reconhecimento.interimResults = false;

    const botaoMic = document.getElementById('botaoMicrofone');
    let gravando = false;

    botaoMic.addEventListener('click', () => {
        if (!gravando) {
            reconhecimento.start();
            botaoMic.classList.add('bg-principal', 'animate-pulse');
            gravando = true;
        } else {
            reconhecimento.stop();
            botaoMic.classList.remove('bg-principal', 'animate-pulse');
            gravando = false;
        }
    });

    reconhecimento.onresult = (e) => {
        const texto = e.results[0][0].transcript;
        document.getElementById('campoMensagem').value = texto;
        botaoMic.classList.remove('bg-principal', 'animate-pulse');
        gravando = false;
    };

    reconhecimento.onerror = () => {
        botaoMic.classList.remove('bg-principal', 'animate-pulse');
        gravando = false;
    };
}

// === ENVIAR MENSAGEM PARA A IA ===
async function enviarMensagem() {
    const campo = document.getElementById('campoMensagem');
    const texto = campo.value.trim();
    if (!texto) return;

    adicionarMensagem('voce', texto);
    campo.value = '';
    adicionarMensagem('ia', 'Pensando... ⏳');

    let instrucao = '';
    switch(jogoSelecionado) {
        case 'minecraft':
            instrucao = `Você é especialista em Minecraft Bedrock. Responda com comandos, addons, redstone e dicas sempre compatíveis com a versão Bedrock. Explique tudo passo a passo e de forma simples. Pergunta: ${texto}`;
            break;
        case 'roblox':
            instrucao = `Você é especialista em scripts Roblox e Delta Mobile. Use código Lua funcional, organizado e explique exatamente onde e como usar. Pergunta: ${texto}`;
            break;
        case 'ff':
            instrucao = `Você é especialista em Free Fire. Dê DPI, sensibilidade, configurações e dicas de mira por modelo de celular. Pergunta: ${texto}`;
            break;
        default:
            instrucao = `Responda em português, de forma clara, direta e organizada: ${texto}`;
    }

    try {
        const resposta = await fetch(URL_IA, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${CHAVE_IA}`
            },
            body: JSON.stringify({
                model: MODELO_IA,
                messages: [{ role: "user", content: instrucao }]
            })
        });

        const dados = await resposta.json();
        removerUltimaMensagem();

        if (dados.error) throw new Error(dados.error.message);
        adicionarMensagem('ia', dados.choices[0].message.content);

    } catch (erro) {
        removerUltimaMensagem();
        adicionarMensagem('ia', `❌ Erro: ${erro.message}`);
    }
}

// === FUNÇÕES DE EXIBIÇÃO DAS MENSAGENS ===
function adicionarMensagem(tipo, conteudo) {
    const caixa = document.getElementById('caixaConversa');
    const div = document.createElement('div');
    div.className = `max-w-[88%] p-4 rounded-lg shadow-sm whitespace-pre-wrap leading-relaxed ${
        tipo === 'voce' 
        ? 'bg-principal/90 ml-auto text-white text-right' 
        : 'bg-medio mensagem-ia mr-auto'
    }`;
    div.textContent = conteudo;
    caixa.appendChild(div);
    caixa.scrollTop = caixa.scrollHeight;
}

function removerUltimaMensagem() {
    const caixa = document.getElementById('caixaConversa');
    caixa.removeChild(caixa.lastChild);
}

// === ENVIAR COM A TECLA ENTER ===
document.getElementById('campoMensagem').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') enviarMensagem();
});
</script>

</body>
                    </html>
