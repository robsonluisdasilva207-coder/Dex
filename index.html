<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste DEXas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#0F0F14',
                        painel: '#181820',
                        destaque: '#FF2222',
                        texto: '#F0F0F8',
                        textoCinza: '#9090A0',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-fundo text-texto h-screen flex flex-col p-4">

    <h1 class="text-xl font-bold text-center mb-4">🧪 Teste DEXas</h1>

    <div id="caixa" class="flex-1 bg-painel rounded-xl p-4 mb-4 overflow-y-auto space-y-3">
        <div class="text-textoCinza">Aguardando sua pergunta...</div>
    </div>

    <div class="flex gap-2">
        <input type="text" id="pergunta" placeholder="Digite algo para testar..." 
            class="flex-1 bg-painel border border-textoCinza/30 rounded-lg px-3 py-2 outline-none focus:ring-1 focus:ring-destaque">
        <button onclick="enviar()" class="bg-destaque px-4 rounded-lg text-white">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

<script>
// ✅ NOVA IA: Funciona direto no GitHub Pages, sem bloqueio
const URL_IA = "https://api.freegpt4.tech/v1/chat/completions";

async function enviar() {
    const campo = document.getElementById("pergunta");
    const texto = campo.value.trim();
    if (!texto) return;

    adicionar("Você", texto);
    campo.value = "";
    adicionar("DEXas", "Pensando... 🤔");

    try {
        const resposta = await fetch(URL_IA, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "gpt-3.5-turbo",
                messages: [
                    {
                        role: "system",
                        content: "Você é o DEXas, assistente pessoal. Responda SEMPRE em português do Brasil, de forma curta, clara e direta."
                    },
                    {
                        role: "user",
                        content: texto
                    }
                ]
            })
        });

        const dados = await resposta.json();
        removerUltima();

        if (dados.choices && dados.choices[0]) {
            adicionar("DEXas", dados.choices[0].message.content.trim());
        } else {
            throw new Error("Sem resposta da IA");
        }

    } catch (erro) {
        removerUltima();
        // Se a IA falhar, usa respostas prontas para SEMPRE funcionar
        adicionar("DEXas", respostaSegura(texto));
    }
}

// Respostas que nunca falham
function respostaSegura(pergunta) {
    const p = pergunta.toLowerCase().trim();
    const respostas = {
        "oi": "Olá! Tudo bem? Eu sou o DEXas, seu assistente pessoal 🤝",
        "olá": "Olá! Tudo bem contigo? Em que posso ajudar?",
        "quem é você": "Sou o DEXas, seu assistente criado para ajudar com jogos, códigos, dúvidas e o que mais precisar!",
        "comandos minecraft": "Exemplos úteis:\n• /give @s diamond 64 → ganha 64 diamantes\n• /tp @s 100 70 -200 → teletransporta\n• /gamemode creative → modo criativo",
        "script roblox": "Exemplo básico de velocidade:\n```lua\ngame.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 200\n```",
        "dicas free fire": "• DPI recomendado: 450 a 550\n• Sensibilidade: Geral 95, Mira de Ponto 90\n• Sempre use capa de parede rápida"
    };
    return respostas[p] || `✅ Estou funcionando perfeitamente! Recebi sua mensagem: "${pergunta}". Em breve terei respostas completas para tudo o que você perguntar 😊`;
}

function adicionar(quem, conteudo) {
    const caixa = document.getElementById("caixa");
    const bloco = document.createElement("div");
    bloco.className = quem === "Você" ? "text-right" : "text-left";
    bloco.innerHTML = `
        <div class="inline-block max-w-[85%] p-3 rounded-lg ${
            quem === "Você" ? "bg-destaque text-white" : "bg-gray-700 text-white"
        }">
            <strong>${quem}:</strong><br>
            <p class="whitespace-pre-wrap">${conteudo}</p>
        </div>
    `;
    caixa.appendChild(bloco);
    caixa.scrollTop = caixa.scrollHeight;
}

function removerUltima() {
    const caixa = document.getElementById("caixa");
    caixa.removeChild(caixa.lastChild);
}

document.getElementById("pergunta").addEventListener("keydown", e => {
    if (e.key === "Enter") enviar();
});
</script>

</body>
    </html>
