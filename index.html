<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>DEX IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#ff2222',
                        escuro: '#121218',
                        medio: '#1e1e29',
                        claro: '#f8f8f8',
                        cinza: '#2a2a36',
                        cinzaClaro: '#888899',
                        texto: '#e2e2e9'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .transicao { transition: all 0.3s ease; }
            .mensagem-ia { border-left: 3px solid #ff2222; }
            .menu-jogos { max-height: 0; overflow: hidden; }
            .menu-jogos.aberto { max-height: 200px; }
            .ponto { @apply w-2 h-2 rounded-full bg-principal; }
        }
    </style>
</head>
<body class="bg-escuro text-texto font-sans overflow-x-hidden">

<!-- LADO ESQUERDO - MENU PRINCIPAL -->
<div class="fixed top-0 left-0 h-full w-20 bg-medio shadow-lg z-50 flex flex-col items-center py-6 justify-between">
    <div class="flex flex-col gap-8 items-center">
        <!-- Logo DEX IA -->
        <div class="flex items-center gap-2">
            <div class="flex flex-col gap-0.5">
                <div class="flex gap-0.5"><div class="ponto"></div><div class="ponto"></div></div>
                <div class="flex gap-0.5"><div class="ponto"></div><div class="ponto"></div></div>
            </div>
            <span class="text-xl font-bold text-principal">DEX</span>
        </div>

        <!-- Botão Menu -->
        <button id="botaoMenu" class="text-2xl hover:scale-110 transicao">
            <i class="fa fa-bars"></i>
        </button>

        <!-- Botão Chat -->
        <button class="text-xl text-principal hover:scale-110 transicao">
            <i class="fa fa-comments"></i>
        </button>

        <!-- Botão + Jogos -->
        <button id="botaoMais" class="w-10 h-10 rounded-full bg-cinza flex items-center justify-center text-xl transicao hover:bg-principal hover:text-white">
            +
        </button>
    </div>

    <div class="text-sm text-cinzaClaro">v1.0</div>
</div>

<!-- MENU DE JOGOS (abre ao clicar no +) -->
<div id="menuJogos" class="fixed left-20 top-28 w-48 bg-medio rounded-lg shadow-xl z-40 menu-jogos transicao p-2">
    <button onclick="mudarJogo('minecraft')" class="w-full text-left p-2 rounded hover:bg-cinza flex items-center gap-2">
        <span class="text-green-500">🟩</span> Minecraft
    </button>
    <button onclick="mudarJogo('roblox')" class="w-full text-left p-2 rounded hover:bg-cinza flex items-center gap-2">
        <span class="text-red-500">R</span> Roblox
    </button>
    <button onclick="mudarJogo('ff')" class="w-full text-left p-2 rounded hover:bg-cinza flex items-center gap-2">
        <span class="text-white">FF</span> Free Fire
    </button>
</div>

<!-- ÁREA PRINCIPAL DO CHAT -->
<main class="ml-20 h-screen flex flex-col">
    <!-- Cabeçalho -->
    <header class="h-16 bg-medio flex items-center justify-between px-6 border-b border-cinza">
        <h2 class="text-lg font-semibold">DEX IA <span id="jogoAtual" class="text-sm text-cinzaClaro ml-2">| Nenhum jogo selecionado</span></h2>
        <div class="flex gap-4">
            <button class="text-lg hover:text-principal transicao"><i class="fa fa-search"></i></button>
            <button class="text-lg hover:text-principal transicao"><i class="fa fa-phone"></i></button>
        </div>
    </header>

    <!-- Conversa -->
    <div id="caixaConversa" class="flex-1 p-6 overflow-y-auto space-y-4 bg-escuro">
        <div class="mensagem-ia bg-medio p-3 rounded-lg max-w-[85%]">
            <p>👋 Olá! Selecione um jogo no botão + e me peça o que precisar: scripts, comandos, configurações ou ajuda com qualquer coisa!</p>
        </div>
    </div>

    <!-- Campo de entrada com todas as funções -->
    <div class="h-20 bg-medio border-t border-cinza px-4 flex items-center gap-2">
        <input type="file" id="entradaImagem" accept="image/*" class="hidden">
        <button onclick="document.getElementById('entradaImagem').click()" class="w-10 h-10 rounded-full bg-cinza flex items-center justify-center text-lg transicao hover:bg-principal">
            <i class="fa fa-image"></i>
        </button>

        <button id="botaoMicrofone" class="w-10 h-10 rounded-full bg-cinza flex items-center justify-center text-lg transicao hover:bg-principal">
            <i class="fa fa-microphone"></i>
        </button>

        <input type="text" id="campoMensagem" placeholder="Digite sua mensagem..." class="flex-1 bg-cinza rounded-full px-4 py-2 outline-none focus:ring-1 focus:ring-principal">

        <button onclick="enviarMensagem()" class="w-10 h-10 rounded-full bg-principal flex items-center justify-center text-white text-lg transicao hover:bg-principal/90">
            <i class="fa fa-paper-plane"></i>
        </button>
    </div>
</main>

<script>
    
// === CONFIGURAÇÃO DA IA ===
const CHAVE_IA = "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";
const URL_IA = "https://api.groq.com/openai/v1/chat/completions";
const MODELO_IA = "llama3-70b-8192";
    

let jogoSelecionado = null;
let reconhecimento = null;

// === ABRIR/FECHAR MENU DE JOGOS ===
const botaoMais = document.getElementById('botaoMais');
const menuJogos = document.getElementById('menuJogos');
botaoMais.addEventListener('click', () => {
    menuJogos.classList.toggle('aberto');
    botaoMais.classList.toggle('bg-principal');
    botaoMais.classList.toggle('text-white');
});

// === SELECIONAR JOGO ===
function mudarJogo(jogo) {
    jogoSelecionado = jogo;
    const nomes = {minecraft: "Minecraft Bedrock", roblox: "Roblox / Delta", ff: "Free Fire"};
    document.getElementById('jogoAtual').textContent = `| ${nomes[jogo]}`;
    menuJogos.classList.remove('aberto');
    botaoMais.classList.remove('bg-principal', 'text-white');
}

// === RECONHECIMENTO DE VOZ (MICROFONE) ===
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    reconhecimento = new SpeechRecognition();
    reconhecimento.lang = 'pt-BR';
    reconhecimento.continuous = false;
    reconhecimento.interimResults = false;

    const botaoMic = document.getElementById('botaoMicrofone');
    let gravando = false;

    botaoMic.addEventListener('click', () => {
        if (!gravando) {
            reconhecimento.start();
            botaoMic.classList.add('bg-principal', 'animate-pulse');
            gravando = true;
        } else {
            reconhecimento.stop();
            botaoMic.classList.remove('bg-principal', 'animate-pulse');
            gravando = false;
        }
    });

    reconhecimento.onresult = (e) => {
        const texto = e.results[0][0].transcript;
        document.getElementById('campoMensagem').value = texto;
        botaoMic.classList.remove('bg-principal', 'animate-pulse');
        gravando = false;
    };

    reconhecimento.onerror = () => {
        botaoMic.classList.remove('bg-principal', 'animate-pulse');
        gravando = false;
    };
}

// === ENVIAR IMAGEM PARA ANÁLISE ===
document.getElementById('entradaImagem').addEventListener('change', async (e) => {
    const arquivo = e.target.files[0];
    if (!arquivo) return;

    adicionarMensagem('voce', `📸 Enviou uma imagem`);
    adicionarMensagem('ia', 'Analisando imagem... ⏳');

    const leitor = new FileReader();
    leitor.onload = async () => {
        const base64 = leitor.result.split(',')[1];
        const instrucao = jogoSelecionado 
            ? `Você é especialista em ${jogoSelecionado}. Analise essa imagem e responda em português de forma clara.`
            : `Analise essa imagem e descreva ou responda o que for perguntado, em português.`;

        try {
            const resposta = await fetch(URL_IA, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: instrucao },
                            { inlineData: { mimeType: arquivo.type, data: base64 } }
                        ]
                    }]
                })
            });
            const dados = await resposta.json();
            removerUltimaMensagem();
            if (dados.error) throw new Error(dados.error.message);
            adicionarMensagem('ia', dados.candidates[0].content.parts[0].text);
        } catch (erro) {
            removerUltimaMensagem();
            adicionarMensagem('ia', `❌ Erro: ${erro.message}`);
        }
    };
    leitor.readAsDataURL(arquivo);
});

// === ENVIAR MENSAGEM DE TEXTO ===
async function enviarMensagem() {
    const campo = document.getElementById('campoMensagem');
    const texto = campo.value.trim();
    if (!texto) return;

    adicionarMensagem('voce', texto);
    campo.value = '';
    adicionarMensagem('ia', 'Pensando... ⏳');

    let instrucao = '';
    switch(jogoSelecionado) {
        case 'minecraft':
            instrucao = `Você é especialista em Minecraft Bedrock. Responda com comandos, addons, redstone compatíveis com a versão Bedrock. Pergunta: ${texto}`;
            break;
        case 'roblox':
            instrucao = `Você é especialista em scripts Roblox / Delta Mobile. Use código Lua funcional e explique onde usar. Pergunta: ${texto}`;
            break;
        case 'ff':
            instrucao = `Você é especialista em Free Fire. Dê DPI, sensibilidade e configurações por modelo de celular. Pergunta: ${texto}`;
            break;
        default:
            instrucao = `Responda de forma clara e direta em português: ${texto}`;
    }

    try {
        const resposta = await fetch(URL_IA, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: instrucao }] }] })
        });
        const dados = await resposta.json();
        removerUltimaMensagem();
        if (dados.error) throw new Error(dados.error.message);
        adicionarMensagem('ia', dados.candidates[0].content.parts[0].text);
    } catch (erro) {
        removerUltimaMensagem();
        adicionarMensagem('ia', `❌ Erro: ${erro.message}`);
    }
}

// === FUNÇÕES DE EXIBIÇÃO ===
function adicionarMensagem(tipo, conteudo) {
    const caixa = document.getElementById('caixaConversa');
    const div = document.createElement('div');
    div.className = `max-w-[85%] p-3 rounded-lg whitespace-pre-wrap ${
        tipo === 'voce' 
        ? 'bg-principal ml-auto text-right' 
        : 'bg-medio mensagem-ia mr-auto'
    }`;
    div.textContent = conteudo;
    caixa.appendChild(div);
    caixa.scrollTop = caixa.scrollHeight;
}

function removerUltimaMensagem() {
    const caixa = document.getElementById('caixaConversa');
    caixa.removeChild(caixa.lastChild);
}

document.getElementById('campoMensagem').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') enviarMensagem();
});
</script>

</body>
                                                     </html>
