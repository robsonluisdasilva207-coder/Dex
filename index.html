<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Dex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fundo: '#121218',
                        painel: '#1a1a22',
                        itemAtivo: '#2b1a20',
                        destaque: '#ff2222',
                        textoClaro: '#f0f0f8',
                        textoCinza: '#a0a0b0',
                        borda: '#282832'
                    },
                    fontFamily: { sans: ['Inter', 'Segoe UI', 'Roboto', 'sans-serif'] }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .transicao { transition: all 0.25s ease; }
            .menu-lateral { width: 220px; }
            .item-menu { @apply flex items-center gap-3 p-3 rounded-xl transicao hover:bg-painel/60; }
            .item-menu.ativo { @apply bg-itemAtivo border-l-2 border-destaque; }
            .bolha-ia { @apply bg-painel rounded-2xl p-4 max-w-[85%] rounded-tl-sm; }
            .bolha-usuario { @apply bg-destaque rounded-2xl p-4 max-w-[85%] rounded-tr-sm ml-auto text-white; }
        }
    </style>
</head>
<body class="bg-fundo text-textoClaro font-sans h-screen flex overflow-hidden">

<!-- MENU LATERAL ESQUERDO -->
<div class="menu-lateral bg-painel border-r border-borda p-4 flex flex-col justify-between">
    <div class="space-y-2 mt-4">
        <div class="item-menu">
            <div class="w-8 h-8 rounded-full bg-fundo flex items-center justify-center text-textoClaro">
                <i class="fa-solid fa-history"></i>
            </div>
            <span class="text-sm">History</span>
            <i class="fa-solid fa-chevron-down ml-auto text-xs text-textoCinza"></i>
        </div>

        <div class="item-menu ativo">
            <div class="w-8 h-8 rounded-full bg-destaque flex items-center justify-center text-white">
                <i class="fa-solid fa-plus"></i>
            </div>
            <span class="text-sm font-medium">New Chat</span>
        </div>

        <div class="item-menu">
            <div class="w-8 h-8 rounded-full bg-fundo flex items-center justify-center text-textoClaro">
                <i class="fa-solid fa-gamepad"></i>
            </div>
            <span class="text-sm">Games</span>
        </div>

        <div class="item-menu">
            <div class="w-8 h-8 rounded-full bg-fundo flex items-center justify-center text-textoClaro">
                <i class="fa-solid fa-gear"></i>
            </div>
            <span class="text-sm">Settings</span>
        </div>
    </div>

    <div class="mt-auto pt-4 border-t border-borda text-xs text-textoCinza text-center">
        Chat Dex v1.0
    </div>
</div>

<!-- ÁREA PRINCIPAL DO CHAT -->
<div class="flex-1 flex flex-col h-full">
    <!-- CABEÇALHO -->
    <header class="bg-painel border-b border-borda px-6 py-4 flex items-center justify-between">
        <div>
            <h1 class="text-xl font-bold">Chat Dex</h1>
            <p class="text-xs text-textoCinza mt-1">Assistente especializado para jogos e dúvidas gerais</p>
        </div>
        <div class="flex gap-4 text-textoCinza">
            <button class="hover:text-textoClaro transicao"><i class="fa-solid fa-desktop"></i></button>
            <button class="hover:text-textoClaro transicao"><i class="fa-solid fa-circle-half-stroke"></i></button>
            <button class="hover:text-destaque transicao"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </header>

    <!-- CONVERSA -->
    <div id="caixaConversa" class="flex-1 overflow-y-auto p-6 space-y-6 bg-fundo/80">
        <!-- Exemplo de mensagens inicial -->
        <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-destaque flex items-center justify-center text-white shrink-0">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div class="bolha-ia">
                <p class="text-sm leading-relaxed">👋 Olá! Eu sou o Chat Dex. Selecione um jogo ou envie sua pergunta, e eu ajudo com comandos, scripts, dicas e configurações!</p>
            </div>
        </div>
    </div>

    <!-- BARRA DE ENVIO -->
    <div class="bg-painel border-t border-borda p-4 flex items-center gap-3">
        <button class="w-9 h-9 rounded-full bg-fundo flex items-center justify-center text-textoClaro hover:bg-destaque hover:text-white transicao">
            <i class="fa-solid fa-image"></i>
        </button>
        <input type="text" id="campoMensagem" placeholder="Digite sua mensagem..." class="flex-1 bg-fundo rounded-full px-4 py-2 outline-none focus:ring-1 focus:ring-destaque/50 text-sm">
        <button onclick="enviarMensagem()" class="w-9 h-9 rounded-full bg-destaque flex items-center justify-center text-white hover:bg-destaque/90 transicao">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
// ==============================================
// CONFIGURAÇÃO DEEPSEEK - JÁ COM SUA CHAVE
// ==============================================
const CHAVE_IA = "sk-e59d15790dc8482881890d1e7c53393a";
const URL_IA = "https://api.deepseek.com/v1/chat/completions";
const MODELO_IA = "deepseek-vision";

let jogoSelecionado = null;
let imagemBase64 = null;
let historicoConversas = [];

// ==============================================
// FUNÇÕES DE INTERAÇÃO
// ==============================================
function mudarJogo(jogo) {
    jogoSelecionado = jogo;
    adicionarMensagem('ia', `✅ Modo ativado: ${jogo === 'minecraft' ? 'Minecraft Bedrock' : jogo === 'roblox' ? 'Roblox / Delta' : 'Free Fire'}`);
}

// Enviar mensagem
async function enviarMensagem() {
    const campo = document.getElementById('campoMensagem');
    const texto = campo.value.trim();
    if (!texto && !imagemBase64) return;

    adicionarMensagem('usuario', texto);
    campo.value = '';
    adicionarMensagem('ia', 'Processando... ⏳');

    let instrucao = '';
    switch(jogoSelecionado) {
        case 'minecraft':
            instrucao = `Você é especialista em Minecraft Bedrock. Responda com comandos, códigos e dicas compatíveis com a versão Bedrock. Explique de forma simples. Pergunta: ${texto}`;
            break;
        case 'roblox':
            instrucao = `Você é especialista em Roblox e scripts para Delta Mobile. Forneça códigos Lua funcionais e explique onde aplicar. Pergunta: ${texto}`;
            break;
        case 'ff':
            instrucao = `Você é especialista em Free Fire. Dê dicas de DPI, sensibilidade e configurações para celular. Pergunta: ${texto}`;
            break;
        default:
            instrucao = `Responda em português do Brasil, de forma clara e direta: ${texto}`;
    }

    try {
        const mensagens = [{ role: "user", content: [{ type: "text", text: instrucao }] }];

        const resposta = await fetch(URL_IA, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${CHAVE_IA}`
            },
            body: JSON.stringify({ model: MODELO_IA, messages: mensagens })
        });

        const dados = await resposta.json();
        removerUltimaMensagem();

        if (dados.error) throw new Error(dados.error.message);
        const respostaIA = dados.choices[0].message.content;
        adicionarMensagem('ia', respostaIA);

    } catch (erro) {
        removerUltimaMensagem();
        adicionarMensagem('ia', `❌ Erro: ${erro.message || 'Não foi possível conectar'}`);
    }
}

// Funções auxiliares
function adicionarMensagem(tipo, conteudo) {
    const caixa = document.getElementById('caixaConversa');
    const div = document.createElement('div');
    div.className = `flex gap-3 ${tipo === 'usuario' ? 'flex-row-reverse' : ''}`;
    div.innerHTML = `
        <div class="w-8 h-8 rounded-full shrink-0 flex items-center justify-center ${tipo === 'usuario' ? 'bg-destaque text-white' : 'bg-painel text-destaque'}">
            <i class="fa-solid ${tipo === 'usuario' ? 'fa-user' : 'fa-robot'}"></i>
        </div>
        <div class="${tipo === 'usuario' ? 'bolha-usuario' : 'bolha-ia'}">
            <p class="text-sm leading-relaxed whitespace-pre-wrap">${conteudo}</p>
        </div>
    `;
    caixa.appendChild(div);
    caixa.scrollTop = caixa.scrollHeight;
}

function removerUltimaMensagem() {
    const caixa = document.getElementById('caixaConversa');
    caixa.removeChild(caixa.lastChild);
}

document.getElementById('campoMensagem').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') enviarMensagem();
});
</script>

</body>
</html>
