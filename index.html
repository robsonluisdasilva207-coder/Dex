<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>DEXas - IA Própria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { fundo:'#0A0A0F', fundoCard:'#12121A', menuFundo:'#0E0E16', destaque:'#FF2233', destaqueClaro:'#FF4455', texto:'#F8F8FC', textoSuave:'#B0B0C0', borda:'#222230' } } } }
    </script>
    <style>
        .transicao { transition: all 0.3s ease; }
        .menu-lateral { width:280px; transform:translateX(-100%); background:linear-gradient(180deg,#0E0E16,#0A0A0F); }
        .menu-lateral.aberto { transform:translateX(0); }
        .item-menu { @apply flex items-center gap-4 p-3 rounded-xl transicao; }
        .item-menu:hover { @apply bg-fundoCard translate-x-1; }
        .item-menu.ativo { @apply bg-destaque/10 border-l-4 border-destaque text-destaque; }
        .bolha-ia { @apply bg-fundoCard rounded-2xl p-4 max-w-[88%] rounded-tl-sm; border-left:3px solid #222230; }
        .bolha-usuario { @apply bg-gradient-to-br from-destaque to-destaqueClaro rounded-2xl p-4 max-w-[88%] rounded-tr-sm ml-auto text-white; }
        .animate-fade { animation:fadeIn 0.3s forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    </style>
</head>
<body class="bg-fundo text-texto h-screen flex overflow-hidden">

<!-- MENU LATERAL -->
<div id="menuLateral" class="menu-lateral fixed top-0 left-0 h-full z-50 border-r border-borda">
    <div class="p-5 border-b border-borda/50">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-destaque to-destaqueClaro flex items-center justify-center text-white"><i class="fa-solid fa-brain"></i></div>
                <h2 class="text-xl font-bold">DEXas</h2>
            </div>
            <button id="fecharMenu" class="text-xl text-textoSuave hover:text-destaque"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <p class="text-xs text-textoSuave mt-2">IA própria — sem serviços externos</p>
    </div>
    <div class="p-4 space-y-2 mt-2">
        <div class="item-menu ativo"><div class="w-9 h-9 rounded-lg bg-fundo flex items-center justify-center text-destaque"><i class="fa-solid fa-comments"></i></div><span>Nova Conversa</span></div>
        <div class="item-menu" onclick="abrirJogos()"><div class="w-9 h-9 rounded-lg bg-fundo flex items-center justify-center text-blue-400"><i class="fa-solid fa-gamepad"></i></div><span>Modos Jogos</span></div>
    </div>
    <div class="absolute bottom-5 left-0 right-0 text-center text-xs text-textoSuave">DEXas IA v1.0</div>
</div>

<!-- ÁREA PRINCIPAL -->
<div class="flex-1 flex flex-col h-full">
    <header class="bg-menuFundo border-b border-borda/50 px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button id="abrirMenu" class="w-10 h-10 rounded-xl bg-fundo flex items-center justify-center text-lg"><i class="fa-solid fa-bars"></i></button>
            <div><h1 class="text-lg font-bold">DEXas</h1><p id="status" class="text-xs text-textoSuave">Carregando IA local...</p></div>
        </div>
    </header>
    <div id="caixa" class="flex-1 overflow-y-auto p-5 space-y-5 bg-gradient-to-b from-fundo to-fundo/95">
        <div class="flex gap-3 animate-fade">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-destaque to-destaqueClaro flex items-center justify-center text-white"><i class="fa-solid fa-robot"></i></div>
            <div class="bolha-ia"><p>👋 Estou carregando minha inteligência dentro do seu navegador. Aguarde uns 30~60 segundos na primeira vez — depois respondo tudo sem precisar de nada externo!</p></div>
        </div>
    </div>
    <div class="bg-menuFundo border-t border-borda/50 p-4 flex gap-3">
        <input id="mensagem" type="text" placeholder="Digite sua pergunta..." class="flex-1 bg-fundo rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-destaque/40">
        <button onclick="enviar()" class="w-10 h-10 rounded-xl bg-gradient-to-br from-destaque to-destaqueClaro flex items-center justify-center text-white"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/dist/web-llm.min.js"></script>
<script>
let engine;
const status = document.getElementById('status');

// Inicializa IA LOCAL, sem conexão externa depois de carregada
async function iniciarIA() {
    try {
        engine = await webllm.CreateMLCEngine("Mistral-7B-Instruct-v0.2-q4f16_1");
        status.textContent = "IA pronta! Modo: Geral 💬";
        adicionar("ia", "✅ Estou pronto! Sou o DEXas, minha inteligência roda aqui mesmo no seu navegador. Pergunte qualquer coisa!");
    } catch (e) {
        status.textContent = "Erro ao carregar IA";
        adicionar("ia", "❌ Não consegui carregar o modelo. Use um navegador atualizado (Chrome, Edge, Firefox).");
    }
}

// Envia pergunta e gera resposta real
async function enviar() {
    const campo = document.getElementById('mensagem');
    const texto = campo.value.trim();
    if (!texto || !engine) return;
    adicionar("usuario", texto);
    campo.value = "";
    adicionar("ia", "Pensando... 🤔");

    const resposta = await engine.chat.completions.create({
        messages: [
            { role: "system", content: "Você é o DEXas, assistente pessoal. Responda SEMPRE em português do Brasil, curto, claro e amigável. Ajuda com jogos, códigos, dúvidas e conversas." },
            { role: "user", content: texto }
        ],
        max_tokens: 600,
        temperature: 0.7
    });
    removerUltima();
    adicionar("ia", resposta.choices[0].message.content.trim());
}

// Funções auxiliares
function adicionar(tipo, txt) {
    const caixa = document.getElementById('caixa');
    const div = document.createElement('div');
    div.className = "flex gap-3 animate-fade";
    div.innerHTML = `
        <div class="w-10 h-10 rounded-xl shrink-0 flex items-center justify-center ${tipo==='usuario'?'bg-gradient-to-br from-destaque to-destaqueClaro':'bg-fundoCard text-destaque'}">
            <i class="fa-solid ${tipo==='usuario'?'fa-user':'fa-robot'}"></i>
        </div>
        <div class="${tipo==='usuario'?'bolha-usuario':'bolha-ia'}"><p class="whitespace-pre-wrap">${txt}</p></div>
    `;
    caixa.appendChild(div);
    caixa.scrollTop = caixa.scrollHeight;
}
function removerUltima() { document.getElementById('caixa').removeChild(document.getElementById('caixa').lastChild); }

// Controles menu
document.getElementById('abrirMenu').onclick = () => document.getElementById('menuLateral').classList.add('aberto');
document.getElementById('fecharMenu').onclick = () => document.getElementById('menuLateral').classList.remove('aberto');
document.getElementById('mensagem').addEventListener('keydown', e => e.key==='Enter' && enviar());

// Começa a carregar a IA
window.onload = iniciarIA;
</script>
</body>
</html>
